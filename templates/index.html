<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brooklyn Foot Traffic</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; }

        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(15,15,15,0.92); backdrop-filter: blur(8px);
            padding: 14px 20px;
            display: flex; align-items: center; gap: 20px;
            border-bottom: 1px solid #222;
        }
        #header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.03em; color: #fff; }
        #header span { font-size: 12px; color: #666; }

        .filter-group { display: flex; gap: 6px; margin-left: auto; }
        .filter-btn {
            padding: 6px 16px; border-radius: 20px; border: 1px solid #333;
            background: transparent; color: #aaa; font-size: 13px; cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: #555; color: #fff; }
        .filter-btn.active { background: #fff; color: #000; border-color: #fff; font-weight: 600; }

        #map { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }

        #legend {
            position: fixed; bottom: 24px; left: 20px; z-index: 1000;
            background: rgba(15,15,15,0.88); backdrop-filter: blur(6px);
            border: 1px solid #222; border-radius: 10px; padding: 12px 16px;
            font-size: 12px; color: #aaa;
        }
        #legend .title { font-weight: 600; color: #fff; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
        .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .legend-line { width: 20px; height: 3px; border-radius: 2px; }

        #stats {
            position: fixed; bottom: 24px; right: 20px; z-index: 1000;
            background: rgba(15,15,15,0.88); backdrop-filter: blur(6px);
            border: 1px solid #222; border-radius: 10px; padding: 12px 16px;
            font-size: 12px; color: #aaa; text-align: right;
        }
        #stats .count { font-size: 22px; font-weight: 700; color: #fff; }

        .leaflet-popup-content-wrapper {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .leaflet-popup-tip { background: #1a1a1a; }
        .leaflet-popup-content { margin: 12px 16px; }
        .popup-street { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .popup-cross { font-size: 12px; color: #888; margin-bottom: 10px; }
        .popup-counts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
        .popup-count-item .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
        .popup-count-item .value { font-size: 16px; font-weight: 700; color: #fff; }
        .popup-count-item.active .value { color: #4ade80; }

        /* Subway station marker */
        .station-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
        }
        .station-ridership {
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            white-space: nowrap;
        }
        .station-circle {
            background: #0f0f0f;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 3px 12px rgba(0,0,0,0.7);
        }
        .station-icon {
            font-size: 14px;
            line-height: 1;
        }
        .station-bullets {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
        }
        .line-bullet {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: 900;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            flex-shrink: 0;
        }
        /* Yellow lines need dark text */
        .line-bullet.dark-text { color: #000; }
    </style>
</head>
<body>
    <div id="header">
        <h1>Brooklyn Foot Traffic</h1>
        <span>May 2025 &middot; NYC DOT Pedestrian Counts</span>
        <div class="filter-group">
            <button class="filter-btn" data-time="am">Morning</button>
            <button class="filter-btn active" data-time="pm">Evening</button>
            <button class="filter-btn" data-time="md">Midday</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="legend">
        <div class="title">Pedestrian Count</div>
        <div class="legend-row"><div class="legend-line" style="background:#ef4444"></div>High</div>
        <div class="legend-row"><div class="legend-line" style="background:#f97316"></div>Medium-High</div>
        <div class="legend-row"><div class="legend-line" style="background:#eab308"></div>Medium</div>
        <div class="legend-row"><div class="legend-line" style="background:#22c55e"></div>Low-Medium</div>
        <div class="legend-row"><div class="legend-line" style="background:#3b82f6"></div>Low</div>
    </div>

    <div id="stats">
        <div class="count" id="total-count">--</div>
        <div>streets tracked</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            center: [40.6501, -73.9496],
            zoom: 13,
            zoomControl: false
        });

        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        let currentTime = 'pm';
        let markersLayer = L.layerGroup().addTo(map);
        let gradientCleanups = [];
        let gradCounter = 0;

        function getColor(count, max) {
            const r = count / max;
            if (r >= 0.8) return '#ef4444';
            if (r >= 0.6) return '#f97316';
            if (r >= 0.4) return '#eab308';
            if (r >= 0.2) return '#22c55e';
            return '#3b82f6';
        }

        function buildPopup(p, time) {
            return (
                '<div class="popup-street">' + p.street + '</div>' +
                '<div class="popup-cross">' + p.from + ' &rarr; ' + p.to + '</div>' +
                '<div class="popup-counts">' +
                    '<div class="popup-count-item ' + (time === 'am' ? 'active' : '') + '">' +
                        '<div class="label">Morning</div>' +
                        '<div class="value">' + p.am.toLocaleString() + '</div>' +
                    '</div>' +
                    '<div class="popup-count-item ' + (time === 'md' ? 'active' : '') + '">' +
                        '<div class="label">Midday</div>' +
                        '<div class="value">' + p.md.toLocaleString() + '</div>' +
                    '</div>' +
                    '<div class="popup-count-item ' + (time === 'pm' ? 'active' : '') + '">' +
                        '<div class="label">Evening</div>' +
                        '<div class="value">' + p.pm.toLocaleString() + '</div>' +
                    '</div>' +
                '</div>'
            );
        }

        // Inject an SVG linearGradient onto a polyline path so it fades at both ends.
        // Re-applies on zoomend since pixel coords change with zoom.
        function applyFadeGradient(line, latlngs, color, opacity) {
            const gradId = 'fgrad-' + (gradCounter++);

            function apply() {
                var path = line.getElement();
                if (!path) return;
                var svg = path.ownerSVGElement;
                if (!svg) return;

                var first = latlngs[0];
                var last  = latlngs[latlngs.length - 1];
                var p1 = map.latLngToLayerPoint(L.latLng(first[0], first[1]));
                var p2 = map.latLngToLayerPoint(L.latLng(last[0],  last[1]));

                var NS = 'http://www.w3.org/2000/svg';
                var defs = svg.querySelector('defs');
                if (!defs) {
                    defs = document.createElementNS(NS, 'defs');
                    svg.insertBefore(defs, svg.firstChild);
                }

                var existing = defs.querySelector('#' + gradId);
                if (existing) existing.remove();

                var grad = document.createElementNS(NS, 'linearGradient');
                grad.setAttribute('id', gradId);
                grad.setAttribute('gradientUnits', 'userSpaceOnUse');
                grad.setAttribute('x1', p1.x); grad.setAttribute('y1', p1.y);
                grad.setAttribute('x2', p2.x); grad.setAttribute('y2', p2.y);

                [[0, 0], [0.18, opacity], [0.82, opacity], [1, 0]].forEach(function(s) {
                    var stop = document.createElementNS(NS, 'stop');
                    stop.setAttribute('offset', (s[0] * 100) + '%');
                    stop.setAttribute('stop-color', color);
                    stop.setAttribute('stop-opacity', s[1]);
                    grad.appendChild(stop);
                });

                defs.appendChild(grad);
                path.setAttribute('stroke', 'url(#' + gradId + ')');
            }

            line.on('add', apply);
            map.on('zoomend', apply);

            // Return cleanup fn to remove listener and defs entry on layer clear
            return function() {
                map.off('zoomend', apply);
                var path = line.getElement();
                if (path && path.ownerSVGElement) {
                    var el = path.ownerSVGElement.querySelector('#' + gradId);
                    if (el) el.remove();
                }
            };
        }

        async function loadData(time) {
            const resp = await fetch('/api/data?time=' + time);
            const geojson = await resp.json();
            const features = geojson.features;

            // Clean up old gradient listeners
            gradientCleanups.forEach(function(fn) { fn(); });
            gradientCleanups = [];
            markersLayer.clearLayers();
            if (!features.length) return;

            const max = Math.max(...features.map(f => f.properties.count));
            document.getElementById('total-count').textContent = features.length;

            features.forEach(function(f) {
                const p = f.properties;
                const color = getColor(p.count, max);
                const popup = buildPopup(p, time);

                if (f.geometry.type === 'LineString') {
                    const latlngs = f.geometry.coordinates.map(function(c) {
                        return [c[1], c[0]];
                    });

                    // Glow layer
                    var glow = L.polyline(latlngs, {
                        color: color, weight: 12, opacity: 0.22,
                        lineCap: 'round', lineJoin: 'round', interactive: false,
                    });
                    glow.addTo(markersLayer);
                    gradientCleanups.push(applyFadeGradient(glow, latlngs, color, 0.22));

                    // Main line
                    var line = L.polyline(latlngs, {
                        color: color, weight: 4, opacity: 0.9,
                        lineCap: 'round', lineJoin: 'round',
                    });
                    line.bindPopup(popup);
                    markersLayer.addLayer(line);
                    gradientCleanups.push(applyFadeGradient(line, latlngs, color, 0.9));

                } else {
                    var coords = f.geometry.coordinates;
                    var circle = L.circleMarker([coords[1], coords[0]], {
                        radius: 7, fillColor: color, color: 'transparent',
                        fillOpacity: 0.75, weight: 0,
                    });
                    circle.bindPopup(popup);
                    markersLayer.addLayer(circle);
                }
            });
        }

        document.querySelectorAll('.filter-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentTime = btn.dataset.time;
                loadData(currentTime);
            });
        });

        loadData(currentTime);

        // ── Subway stations ────────────────────────────────────────────────────
        const LINE_COLORS = {
            'A':'#0039A6','C':'#0039A6','E':'#0039A6',
            'B':'#FF6319','D':'#FF6319','F':'#FF6319','M':'#FF6319',
            'G':'#6CBE45',
            'J':'#996633','Z':'#996633',
            'L':'#A7A9AC',
            'N':'#FCCC0A','Q':'#FCCC0A','R':'#FCCC0A','W':'#FCCC0A',
            '1':'#EE352E','2':'#EE352E','3':'#EE352E',
            '4':'#00933C','5':'#00933C','6':'#00933C',
            '7':'#B933AD',
            'S':'#808183',
        };
        const YELLOW_LINES = new Set(['N','Q','R','W']);

        function makeBullets(linesStr) {
            return linesStr.split(',').map(function(l) {
                l = l.trim();
                var color = LINE_COLORS[l] || '#555';
                var dark = YELLOW_LINES.has(l) ? ' dark-text' : '';
                return '<div class="line-bullet' + dark + '" style="background:' + color + '">' + l + '</div>';
            }).join('');
        }

        function formatRidership(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'm';
            if (n >= 1000) return (n / 1000).toFixed(0) + 'k';
            return n.toString();
        }

        var stationsLayer = L.layerGroup().addTo(map);

        async function loadStations() {
            const resp = await fetch('/api/stations');
            const geojson = await resp.json();

            geojson.features.forEach(function(f) {
                const p = f.properties;
                const coords = f.geometry.coordinates;

                var icon = L.divIcon({
                    className: '',
                    html: '<div class="station-marker">' +
                              '<div class="station-ridership">' + formatRidership(p.ridership) + '</div>' +
                              '<div class="station-circle"><span class="station-icon">🚇</span></div>' +
                          '</div>',
                    iconAnchor: [14, 28],
                });

                var marker = L.marker([coords[1], coords[0]], { icon: icon });
                marker.bindPopup(
                    '<div class="popup-street">' + p.name + '</div>' +
                    '<div class="popup-cross" style="margin-bottom:8px">Subway Station</div>' +
                    '<div class="station-bullets" style="margin-bottom:10px">' + makeBullets(p.lines) + '</div>' +
                    '<div style="font-size:12px;color:#aaa">2025 ridership: <strong style="color:#fff">' +
                    p.ridership.toLocaleString() + '</strong></div>'
                );
                stationsLayer.addLayer(marker);
            });
        }

        loadStations();
    </script>
</body>
</html>
